<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 650" width="375" height="650" font-family="-apple-system, system-ui, 'Pretendard', sans-serif">
  <rect width="375" height="650" fill="#FFF7FA"/>
  <text x="20" y="19" font-size="13" font-weight="600" fill="#1F2937">9:41</text>
  <rect x="0" y="28" width="375" height="56" fill="#FFFFFF"/>
  <line x1="0" y1="84" x2="375" y2="84" stroke="#F3D4E3"/>
  <text x="20" y="63" font-size="17" font-weight="600" fill="#1F2937">결제수단</text>

  <g transform="translate(20,108)">
    <text x="0" y="0" font-size="22" font-weight="700" fill="#1F2937">어디서 새는지</text>
    <text x="0" y="22" font-size="12" fill="#6B7280">결제수단별 5월 사용액 — 패턴이 보입니다</text>

    <!-- payment method cards with bars -->
    <g transform="translate(0,46)">
      <!-- Credit card (concerning - high) -->
      <rect width="335" height="80" rx="14" fill="#FFFFFF" stroke="#F3D4E3"/>
      <g transform="translate(16,16)">
        <rect width="36" height="36" rx="8" fill="#FCE7F3"/>
        <text x="18" y="25" text-anchor="middle" font-size="16">💳</text>
      </g>
      <text x="64" y="32" font-size="13" font-weight="600" fill="#1F2937">신한카드</text>
      <text x="64" y="48" font-size="11" fill="#9CA3AF">신용카드 · 한도 200만</text>
      <text x="319" y="32" text-anchor="end" font-size="14" font-weight="700" fill="#1F2937">1,425,300</text>
      <text x="319" y="48" text-anchor="end" font-size="10" fill="#DC2626">⚠ 한도의 71%</text>
      <g transform="translate(16,62)">
        <rect width="303" height="6" rx="3" fill="#FEE2E2"/>
        <rect width="215" height="6" rx="3" fill="#DC2626"/>
      </g>
    </g>

    <g transform="translate(0,142)">
      <rect width="335" height="80" rx="14" fill="#FFFFFF" stroke="#F3D4E3"/>
      <g transform="translate(16,16)">
        <rect width="36" height="36" rx="8" fill="#DBEAFE"/>
        <text x="18" y="25" text-anchor="middle" font-size="16">🏦</text>
      </g>
      <text x="64" y="32" font-size="13" font-weight="600" fill="#1F2937">국민체크</text>
      <text x="64" y="48" font-size="11" fill="#9CA3AF">체크카드 · 즉시 출금</text>
      <text x="319" y="32" text-anchor="end" font-size="14" font-weight="700" fill="#1F2937">324,500</text>
      <text x="319" y="48" text-anchor="end" font-size="10" fill="#10B981">건전 · 통장 직결</text>
    </g>

    <g transform="translate(0,238)">
      <rect width="335" height="80" rx="14" fill="#FFFFFF" stroke="#F3D4E3"/>
      <g transform="translate(16,16)">
        <rect width="36" height="36" rx="8" fill="#FEF3C7"/>
        <text x="18" y="25" text-anchor="middle" font-size="16">💵</text>
      </g>
      <text x="64" y="32" font-size="13" font-weight="600" fill="#1F2937">현금</text>
      <text x="64" y="48" font-size="11" fill="#9CA3AF">기록 안 하면 흔적 X</text>
      <text x="319" y="32" text-anchor="end" font-size="14" font-weight="700" fill="#1F2937">85,000</text>
      <text x="319" y="48" text-anchor="end" font-size="10" fill="#F59E0B">기록 필수</text>
    </g>

    <g transform="translate(0,334)">
      <rect width="335" height="80" rx="14" fill="#FFFFFF" stroke="#F3D4E3"/>
      <g transform="translate(16,16)">
        <rect width="36" height="36" rx="8" fill="#FEF9C3"/>
        <text x="18" y="25" text-anchor="middle" font-size="16">📱</text>
      </g>
      <text x="64" y="32" font-size="13" font-weight="600" fill="#1F2937">카카오페이</text>
      <text x="64" y="48" font-size="11" fill="#9CA3AF">간편결제 · 송금/QR</text>
      <text x="319" y="32" text-anchor="end" font-size="14" font-weight="700" fill="#1F2937">142,800</text>
      <text x="319" y="48" text-anchor="end" font-size="10" fill="#9CA3AF">소액 다발</text>
    </g>

    <!-- insight -->
    <g transform="translate(0,434)">
      <rect width="335" height="76" rx="12" fill="#FFF1F5"/>
      <text x="16" y="24" font-size="13" font-weight="700" fill="#BE185D">💡 신호 읽기</text>
      <text x="16" y="42" font-size="11" fill="#374151">신용카드만 한도 가까이 차오르면 그 한 달은</text>
      <text x="16" y="58" font-size="11" fill="#374151">"미래 소득 미리 쓰는 중" — 다음 달 청구서가 무거워짐</text>
    </g>
  </g>
</svg>

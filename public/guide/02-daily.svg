<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 650" width="375" height="650" font-family="-apple-system, system-ui, 'Pretendard', sans-serif">
  <rect width="375" height="650" fill="#FFF7FA"/>
  <text x="20" y="19" font-size="13" font-weight="600" fill="#1F2937">9:41</text>
  <rect x="0" y="28" width="375" height="56" fill="#FFFFFF"/>
  <line x1="0" y1="84" x2="375" y2="84" stroke="#F3D4E3"/>
  <text x="20" y="63" font-size="17" font-weight="600" fill="#1F2937">월 캘린더</text>

  <!-- backdrop dim -->
  <rect x="0" y="84" width="375" height="566" fill="rgba(0,0,0,0.4)"/>

  <!-- AI sheet (right side, full height) -->
  <g transform="translate(35,108)">
    <rect width="320" height="510" rx="16" fill="#FFFFFF" stroke="#F3D4E3"/>

    <!-- sheet header -->
    <rect width="320" height="48" rx="16" fill="#FFFFFF"/>
    <line x1="0" y1="48" x2="320" y2="48" stroke="#FCE7F3"/>
    <text x="20" y="30" font-size="14" fill="#BE185D">✨</text>
    <text x="42" y="30" font-size="14" font-weight="600" fill="#1F2937">AI 입력</text>
    <g transform="translate(72,18)">
      <rect width="56" height="16" rx="4" fill="#F3F4F6"/>
      <text x="28" y="11" text-anchor="middle" font-size="9" fill="#6B7280">Phase 1+2</text>
    </g>

    <!-- input field with caret -->
    <g transform="translate(16,68)">
      <rect width="288" height="48" rx="10" fill="#FFFFFF" stroke="#F472B6" stroke-width="2"/>
      <text x="14" y="30" font-size="15" font-weight="500" fill="#1F2937">스벅 5천</text>
      <line x1="71" y1="14" x2="71" y2="34" stroke="#F472B6" stroke-width="1.5">
        <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
      </line>
    </g>

    <!-- examples -->
    <text x="16" y="142" font-size="11" fill="#6B7280">💡 이렇게 입력해 보세요</text>
    <g transform="translate(16,150)" font-size="11" fill="#374151">
      <g><rect width="80" height="26" rx="13" fill="#FFFFFF" stroke="#F3D4E3"/><text x="40" y="18" text-anchor="middle">스벅 5천</text></g>
      <g transform="translate(86,0)"><rect width="98" height="26" rx="13" fill="#FFFFFF" stroke="#F3D4E3"/><text x="49" y="18" text-anchor="middle">월급 350만</text></g>
      <g transform="translate(190,0)"><rect width="98" height="26" rx="13" fill="#FFFFFF" stroke="#F3D4E3"/><text x="49" y="18" text-anchor="middle">이번달 분석</text></g>
    </g>
    <g transform="translate(16,184)" font-size="11" fill="#374151">
      <g><rect width="118" height="26" rx="13" fill="#FFFFFF" stroke="#F3D4E3"/><text x="59" y="18" text-anchor="middle">오늘 점심 8천</text></g>
      <g transform="translate(124,0)"><rect width="98" height="26" rx="13" fill="#FFFFFF" stroke="#F3D4E3"/><text x="49" y="18" text-anchor="middle">예산 페이지</text></g>
    </g>

    <!-- preview card after enter (mock) -->
    <g transform="translate(16,236)">
      <rect width="288" height="180" rx="12" fill="#FFFFFF" stroke="#F3D4E3"/>
      <text x="14" y="22" font-size="11" fill="#6B7280">아래 내용으로 추가할까요?</text>
      <g transform="translate(14,36)" font-size="12">
        <text x="0" y="14" fill="#6B7280">📅  날짜</text>
        <text x="80" y="14" fill="#1F2937" font-weight="500">2026-05-07 (수)</text>
      </g>
      <g transform="translate(14,60)" font-size="12">
        <text x="0" y="14" fill="#6B7280">🏪  가맹점</text>
        <text x="80" y="14" fill="#1F2937" font-weight="500">스타벅스</text>
      </g>
      <g transform="translate(14,84)" font-size="12">
        <text x="0" y="14" fill="#6B7280">💰  금액</text>
        <text x="80" y="14" fill="#1F2937" font-weight="700">-5,000원</text>
        <rect x="138" y="3" width="32" height="14" rx="3" fill="#F3F4F6"/>
        <text x="154" y="13" text-anchor="middle" font-size="9" fill="#6B7280">지출</text>
      </g>
      <g transform="translate(14,108)" font-size="12">
        <text x="0" y="14" fill="#6B7280">📂  카테고리</text>
        <text x="80" y="14" fill="#1F2937" font-weight="500">카페/간식</text>
        <text x="148" y="14" fill="#9CA3AF" font-size="10">학습됨</text>
      </g>

      <!-- buttons -->
      <g transform="translate(14,142)">
        <rect x="160" y="0" width="58" height="28" rx="6" fill="#FFFFFF" stroke="#F3D4E3"/>
        <text x="189" y="18" text-anchor="middle" font-size="11" fill="#6B7280">✗ 취소</text>
        <rect x="222" y="0" width="50" height="28" rx="6" fill="#F472B6"/>
        <text x="247" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">✓ 추가</text>
      </g>
    </g>

    <text x="16" y="442" font-size="10" fill="#9CA3AF">단축키: Ctrl + K — 어디서나 1초 만에 열림</text>
  </g>
</svg>

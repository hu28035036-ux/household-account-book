<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 650" width="375" height="650" font-family="-apple-system, system-ui, 'Pretendard', sans-serif">
  <rect width="375" height="650" fill="#F7FEE7"/>
  <text x="20" y="19" font-size="13" font-weight="600" fill="#1F2937">9:41</text>
  <rect x="0" y="28" width="375" height="56" fill="#FFFFFF"/>
  <line x1="0" y1="84" x2="375" y2="84" stroke="#F3D4E3"/>
  <text x="20" y="63" font-size="17" font-weight="600" fill="#1F2937">AI 영수증 분석</text>

  <g transform="translate(20,108)">
    <text x="0" y="0" font-size="22" font-weight="700" fill="#1F2937">사진 한 장이면 끝</text>
    <text x="0" y="22" font-size="12" fill="#6B7280">OCR + AI 가 가맹점·금액·카테고리 추정</text>

    <!-- 1) receipt photo -->
    <g transform="translate(0,42)">
      <rect width="155" height="200" rx="12" fill="#FFFFFF" stroke="#F3D4E3"/>
      <rect x="14" y="14" width="127" height="172" rx="6" fill="#ECFCCB" stroke="#BEF264" stroke-dasharray="4 3"/>
      <text x="78" y="68" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">스타벅스 강남점</text>
      <line x1="28" y1="80" x2="128" y2="80" stroke="#F3D4E3"/>
      <text x="28" y="100" font-size="10" fill="#6B7280">아메리카노</text>
      <text x="128" y="100" text-anchor="end" font-size="10" fill="#1F2937">4,500</text>
      <text x="28" y="116" font-size="10" fill="#6B7280">크루아상</text>
      <text x="128" y="116" text-anchor="end" font-size="10" fill="#1F2937">3,800</text>
      <line x1="28" y1="128" x2="128" y2="128" stroke="#F3D4E3"/>
      <text x="28" y="146" font-size="10" font-weight="700" fill="#1F2937">합계</text>
      <text x="128" y="146" text-anchor="end" font-size="10" font-weight="700" fill="#1F2937">8,300</text>
      <text x="28" y="166" font-size="9" fill="#9CA3AF">2026.05.10  09:41</text>
      <text x="78" y="194" text-anchor="middle" font-size="10" fill="#1F2937" font-weight="600">📸 영수증 사진</text>
    </g>

    <!-- arrow -->
    <g transform="translate(160,138)">
      <text x="0" y="6" font-size="20" fill="#1F2937">→</text>
    </g>

    <!-- 2) AI extracted card -->
    <g transform="translate(180,42)">
      <rect width="155" height="200" rx="12" fill="#ECFCCB" stroke="#BEF264" stroke-width="1.5"/>
      <g transform="translate(12,14)">
        <text x="0" y="12" font-size="11" font-weight="700" fill="#1F2937">✨ AI 추출 결과</text>
      </g>
      <text x="12" y="46" font-size="12" font-weight="700" fill="#1F2937">스타벅스 강남점</text>
      <text x="12" y="64" font-size="18" font-weight="700" fill="#1F2937">-8,300원</text>
      <g transform="translate(12,80)">
        <rect width="56" height="20" rx="10" fill="#ECFCCB"/>
        <text x="28" y="14" text-anchor="middle" font-size="10" fill="#1F2937" font-weight="600">카페</text>
      </g>
      <text x="12" y="120" font-size="10" fill="#6B7280">2026.05.10 09:41</text>
      <text x="12" y="138" font-size="10" fill="#6B7280">신용카드 · 신한</text>

      <g transform="translate(12,156)">
        <rect width="131" height="32" rx="8" fill="#A3E635"/>
        <text x="65" y="20" text-anchor="middle" font-size="12" fill="#FFFFFF" font-weight="700">✓ 후보로 추가</text>
      </g>
    </g>

    <!-- bottom -->
    <g transform="translate(0,260)">
      <rect width="335" height="48" rx="10" fill="#ECFCCB"/>
      <text x="16" y="22" font-size="12" font-weight="600" fill="#1F2937">💡 검토 후 [✓] 눌러야 거래내역에 들어감</text>
      <text x="16" y="40" font-size="11" fill="#374151">잘못 추정된 부분은 한 번에 수정 가능</text>
    </g>
  </g>
</svg>

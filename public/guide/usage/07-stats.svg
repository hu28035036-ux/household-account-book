<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 650" width="375" height="650" font-family="-apple-system, system-ui, 'Pretendard', sans-serif">
  <rect width="375" height="650" fill="#FFF7FA"/>
  <text x="20" y="19" font-size="13" font-weight="600" fill="#1F2937">9:41</text>
  <rect x="0" y="28" width="375" height="56" fill="#FFFFFF"/>
  <line x1="0" y1="84" x2="375" y2="84" stroke="#F3D4E3"/>
  <text x="20" y="63" font-size="17" font-weight="600" fill="#1F2937">통계</text>
  <g transform="translate(248,46)"><rect width="80" height="32" rx="8" fill="#FCE7F3" stroke="#F9A8D4"/><text x="40" y="22" text-anchor="middle" font-size="11" fill="#BE185D" font-weight="700">✨ AI 분석</text></g>

  <g transform="translate(20,108)">
    <text x="0" y="0" font-size="22" font-weight="700" fill="#1F2937">5월 회고</text>
    <text x="0" y="22" font-size="12" fill="#6B7280">카테고리별 + 6개월 흐름 + 인사이트</text>

    <!-- 6 month bar chart -->
    <g transform="translate(0,42)">
      <rect width="335" height="140" rx="12" fill="#FFFFFF" stroke="#F3D4E3"/>
      <text x="14" y="22" font-size="11" font-weight="700" fill="#374151">최근 6개월 지출</text>

      <!-- bars -->
      <g transform="translate(20,40)" font-size="9" fill="#9CA3AF" text-anchor="middle">
        <rect x="0" y="50" width="36" height="40" rx="3" fill="#F9A8D4"/>
        <text x="18" y="100">12월</text>
        <text x="18" y="46" fill="#9CA3AF">62만</text>

        <rect x="50" y="40" width="36" height="50" rx="3" fill="#F9A8D4"/>

    <!-- insight card -->
    <g transform="translate(0,360)">
      <rect width="335" height="68" rx="12" fill="#FFF1F5" stroke="#F9A8D4"/>
      <text x="14" y="22" font-size="11" font-weight="700" fill="#BE185D">✨ 이번 달 인사이트</text>

        <text x="118" y="16" fill="#9CA3AF">85만</text>

        <rect x="150" y="35" width="36" height="55" rx="3" fill="#F9A8D4"/>
        <text x="168" y="100">3월</text>
        <text x="168" y="31" fill="#9CA3AF">75만</text>

        <rect x="200" y="55" width="36" height="35" rx="3" fill="#F9A8D4"/>
        <text x="218" y="100">4월</text>
        <text x="218" y="51" fill="#9CA3AF">58만</text>

        <rect x="250" y="25" width="36" height="65" rx="3" fill="#F472B6"/>
        <text x="268" y="100" fill="#BE185D" font-weight="700">5월</text>
        <text x="268" y="21" fill="#BE185D" font-weight="700">63만</text>
      </g>
    </g>

    <!-- category donut + legend -->
    <g transform="translate(0,198)">
      <rect width="335" height="146" rx="12" fill="#FFFFFF" stroke="#F3D4E3"/>
      <text x="14" y="22" font-size="11" font-weight="700" fill="#374151">카테고리별 비중</text>

      <!-- donut -->
      <g transform="translate(80,86)">
        <circle r="42" fill="none" stroke="#F3F4F6" stroke-width="14"/>
        <circle r="42" fill="none" stroke="#F472B6" stroke-width="14"
          stroke-dasharray="100 264" transform="rotate(-90)"/>
        <circle r="42" fill="none" stroke="#FB7185" stroke-width="14"
          stroke-dasharray="60 264" stroke-dashoffset="-100" transform="rotate(-90)"/>
        <circle r="42" fill="none" stroke="#A78BFA" stroke-width="14"
          stroke-dasharray="50 264" stroke-dashoffset="-160" transform="rotate(-90)"/>
        <circle r="42" fill="none" stroke="#60A5FA" stroke-width="14"
          stroke-dasharray="54 264" stroke-dashoffset="-210" transform="rotate(-90)"/>
        <text y="4" text-anchor="middle" font-size="11" font-weight="700" fill="#1F2937">63만</text>
      </g>

      <!-- legend -->
      <g transform="translate(150,52)" font-size="11">
        <circle cx="6" cy="6" r="5" fill="#F472B6"/>
        <text x="18" y="10" fill="#1F2937">식비 38%</text>
        <text x="170" y="10" text-anchor="end" fill="#6B7280">240,000</text>

        <circle cx="6" cy="28" r="5" fill="#FB7185"/>

        <text x="170" y="32" text-anchor="end" fill="#6B7280">144,000</text>

        <circle cx="6" cy="50" r="5" fill="#A78BFA"/>
        <text x="18" y="54" fill="#1F2937">쇼핑 19%</text>
        <text x="170" y="54" text-anchor="end" fill="#6B7280">120,000</text>

        <circle cx="6" cy="72" r="5" fill="#60A5FA"/>
        <text x="18" y="76" fill="#1F2937">기타 20%</text>
        <text x="170" y="76" text-anchor="end" fill="#6B7280">126,000</text>

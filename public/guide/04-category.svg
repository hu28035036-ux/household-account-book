<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 650" width="375" height="650" font-family="-apple-system, system-ui, 'Pretendard', sans-serif">
  <rect width="375" height="650" fill="#FFF7FA"/>
  <text x="20" y="19" font-size="13" font-weight="600" fill="#1F2937">9:41</text>
  <rect x="0" y="28" width="375" height="56" fill="#FFFFFF"/>
  <line x1="0" y1="84" x2="375" y2="84" stroke="#F3D4E3"/>
  <text x="20" y="63" font-size="17" font-weight="600" fill="#1F2937">카테고리</text>

  <g transform="translate(20,108)">
    <text x="0" y="0" font-size="22" font-weight="700" fill="#1F2937">처음에 정한 분류</text>
    <text x="0" y="22" font-size="12" fill="#6B7280">지속이 정확함보다 중요 — 8~12개로 충분합니다</text>

    <!-- category cards: 2 cols x 6 rows -->
    <g transform="translate(0,46)" font-size="12">
      <g><rect width="158" height="58" rx="12" fill="#FFFFFF" stroke="#F3D4E3"/>
        <circle cx="32" cy="29" r="16" fill="#FEE2E2"/><text x="32" y="34" text-anchor="middle" font-size="14">🍚</text>
        <text x="56" y="26" font-weight="600" fill="#1F2937">식비</text>
        <text x="56" y="42" font-size="10" fill="#9CA3AF">필수 · 지출</text>
      </g>
      <g transform="translate(177,0)"><rect width="158" height="58" rx="12" fill="#FFFFFF" stroke="#F3D4E3"/>
        <circle cx="32" cy="29" r="16" fill="#FFEDD5"/><text x="32" y="34" text-anchor="middle" font-size="14">☕</text>
        <text x="56" y="26" font-weight="600" fill="#1F2937">카페/간식</text>
        <text x="56" y="42" font-size="10" fill="#9CA3AF">변동 · 지출</text>
      </g>
    </g>
    <g transform="translate(0,114)" font-size="12">
      <g><rect width="158" height="58" rx="12" fill="#FFFFFF" stroke="#F3D4E3"/>
        <circle cx="32" cy="29" r="16" fill="#DBEAFE"/><text x="32" y="34" text-anchor="middle" font-size="14">🚇</text>
        <text x="56" y="26" font-weight="600" fill="#1F2937">교통</text>
        <text x="56" y="42" font-size="10" fill="#9CA3AF">필수 · 지출</text>
      </g>
      <g transform="translate(177,0)"><rect width="158" height="58" rx="12" fill="#FFFFFF" stroke="#F3D4E3"/>
        <circle cx="32" cy="29" r="16" fill="#FCE7F3"/><text x="32" y="34" text-anchor="middle" font-size="14">🏠</text>
        <text x="56" y="26" font-weight="600" fill="#1F2937">주거</text>
        <text x="56" y="42" font-size="10" fill="#9CA3AF">고정 · 지출</text>
      </g>
    </g>
    <g transform="translate(0,182)" font-size="12">
      <g><rect width="158" height="58" rx="12" fill="#FFFFFF" stroke="#F3D4E3"/>
        <circle cx="32" cy="29" r="16" fill="#E0E7FF"/><text x="32" y="34" text-anchor="middle" font-size="14">📞</text>
        <text x="56" y="26" font-weight="600" fill="#1F2937">통신</text>
        <text x="56" y="42" font-size="10" fill="#9CA3AF">고정 · 지출</text>
      </g>
      <g transform="translate(177,0)"><rect width="158" height="58" rx="12" fill="#FFFFFF" stroke="#F3D4E3"/>
        <circle cx="32" cy="29" r="16" fill="#FEF3C7"/><text x="32" y="34" text-anchor="middle" font-size="14">🎮</text>
        <text x="56" y="26" font-weight="600" fill="#1F2937">여가</text>
        <text x="56" y="42" font-size="10" fill="#9CA3AF">변동 · 지출</text>
      </g>
    </g>
    <g transform="translate(0,250)" font-size="12">
      <g><rect width="158" height="58" rx="12" fill="#FFFFFF" stroke="#F3D4E3"/>
        <circle cx="32" cy="29" r="16" fill="#F3E8FF"/><text x="32" y="34" text-anchor="middle" font-size="14">🛍</text>
        <text x="56" y="26" font-weight="600" fill="#1F2937">쇼핑</text>
        <text x="56" y="42" font-size="10" fill="#9CA3AF">변동 · 지출</text>
      </g>
      <g transform="translate(177,0)"><rect width="158" height="58" rx="12" fill="#FFFFFF" stroke="#F3D4E3"/>
        <circle cx="32" cy="29" r="16" fill="#D1FAE5"/><text x="32" y="34" text-anchor="middle" font-size="14">💼</text>
        <text x="56" y="26" font-weight="600" fill="#1F2937">급여</text>
        <text x="56" y="42" font-size="10" fill="#9CA3AF">수입</text>
      </g>
    </g>

    <!-- bad vs good example -->
    <g transform="translate(0,330)">
      <rect width="335" height="98" rx="12" fill="#FFF1F5"/>
      <text x="16" y="24" font-size="12" font-weight="700" fill="#BE185D">❌ 같은 커피 5천원</text>
      <text x="16" y="42" font-size="11" fill="#6B7280">월요일: "식비"  ·  화요일: "카페/간식"  ·  수요일: "기타"</text>
      <text x="16" y="60" font-size="12" font-weight="700" fill="#10B981">✅ 한 번 정한 분류 그대로</text>
      <text x="16" y="78" font-size="11" fill="#6B7280">월/화/수 모두 "카페/간식" — 학습 규칙이 자동 적용</text>
    </g>
  </g>

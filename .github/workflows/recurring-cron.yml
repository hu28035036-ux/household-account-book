name: Recurring Daily Run

# 매일 KST 09:00 (UTC 00:00) 에 /api/recurring/run 을 호출.
#  - active=true AND auto_post=true AND next_run_date <= today  → 거래 자동 등록
#  - notify_days_before > 0 인 룰의 사전 알림 발송
# 호출은 CRON_TOKEN(Bearer) 으로 인증되며, GitHub Secrets 에 등록되어 있어야 한다.

on:
  schedule:
    # 매일 UTC 00:00 = KST 09:00
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: recurring-cron
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST /api/recurring/run
        env:
          CRON_TOKEN: ${{ secrets.CRON_TOKEN }}
        run: |
          if [ -z "$CRON_TOKEN" ]; then
            echo "::error::CRON_TOKEN secret is not set in repository Settings → Secrets → Actions"
            exit 1
          fi
          for i in 1 2 3; do
            HTTP=$(curl -sS -o /tmp/body.json -w "%{http_code}" --max-time 60 \
              -X POST \
              -H "Authorization: Bearer ${CRON_TOKEN}" \
              -H "content-type: application/json" \
              https://household-account-book-seven-phi.vercel.app/api/recurring/run) && \
              echo "HTTP ${HTTP}" && \
              cat /tmp/body.json && echo "" && \
              [ "${HTTP}" = "200" ] && exit 0
            echo "retry $i..."
            sleep 5
          done
          echo "::error::recurring/run failed after 3 attempts"
          exit 1

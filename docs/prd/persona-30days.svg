<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540" font-family="-apple-system, system-ui, 'Pretendard', sans-serif">
  <rect width="800" height="540" fill="#FFF7FA"/>

  <!-- title -->
  <g transform="translate(400,46)" text-anchor="middle">
    <rect x="-200" y="-22" width="400" height="36" rx="18" fill="#FFFFFF" stroke="#F9A8D4"/>
    <text y="3" font-size="14" font-weight="700" fill="#BE185D">"민지" 의 첫 30일 시나리오</text>
  </g>
  <text x="400" y="98" text-anchor="middle" font-size="11" fill="#9CA3AF">26세 · 1인가구 · 신입사원 · 월급 350만원 · 외식비를 줄이고 싶음</text>

  <!-- timeline track -->
  <line x1="80" y1="180" x2="720" y2="180" stroke="#F3D4E3" stroke-width="3"/>

  <!-- 4 markers -->
  <g>
    <circle cx="120" cy="180" r="12" fill="#F472B6" stroke="#FFFFFF" stroke-width="3"/>
    <text x="120" y="184" text-anchor="middle" font-size="10" font-weight="800" fill="#FFFFFF">1</text>
    <circle cx="320" cy="180" r="12" fill="#F472B6" stroke="#FFFFFF" stroke-width="3"/>
    <text x="320" y="184" text-anchor="middle" font-size="10" font-weight="800" fill="#FFFFFF">7</text>
    <circle cx="520" cy="180" r="12" fill="#F472B6" stroke="#FFFFFF" stroke-width="3"/>
    <text x="520" y="184" text-anchor="middle" font-size="10" font-weight="800" fill="#FFFFFF">14</text>
    <circle cx="680" cy="180" r="12" fill="#F472B6" stroke="#FFFFFF" stroke-width="3"/>
    <text x="680" y="184" text-anchor="middle" font-size="10" font-weight="800" fill="#FFFFFF">30</text>
  </g>

  <!-- Day 1 card -->
  <g transform="translate(40,212)">
    <rect width="160" height="280" rx="14" fill="#FFFFFF" stroke="#F3D4E3"/>
    <rect width="160" height="32" rx="14" fill="#FCE7F3"/>
    <rect y="18" width="160" height="14" fill="#FCE7F3"/>
    <text x="80" y="22" text-anchor="middle" font-size="12" font-weight="800" fill="#BE185D">DAY 1 — 셋업</text>

    <g transform="translate(12,46)" font-size="10" fill="#374151">
      <text font-weight="700" fill="#1F2937">"왜 쓰는지" 적기</text>
      <text y="14" fill="#6B7280">"외식비 30만원 안에"</text>

      <line y1="26" x2="136" y2="26" stroke="#F3F4F6"/>

      <text y="44" font-weight="700" fill="#1F2937">예산 한도 설정</text>
      <text y="58" fill="#6B7280">식비 300k · 카페 100k</text>
      <text y="72" fill="#6B7280">교통 60k · 여가 80k</text>

      <line y1="82" x2="136" y2="82" stroke="#F3F4F6"/>

      <text y="100" font-weight="700" fill="#1F2937">결제수단 등록</text>
      <text y="114" fill="#6B7280">신용카드(신한 ****1234)</text>
      <text y="128" fill="#6B7280">체크(국민) · 현금</text>

      <line y1="138" x2="136" y2="138" stroke="#F3F4F6"/>

      <text y="156" font-weight="700" fill="#1F2937">홈에 추가</text>
      <text y="170" fill="#6B7280">PWA 설치 (Safari 공유)</text>

      <text y="200" font-size="9" font-style="italic" fill="#BE185D">소요: 약 8분</text>

      <g transform="translate(0,210)">
        <rect width="136" height="20" rx="10" fill="#FFF1F5"/>
        <text x="68" y="14" text-anchor="middle" font-size="9" fill="#BE185D" font-weight="700">→ 첫 진입 OK</text>
      </g>
    </g>
  </g>

  <!-- Day 7 card -->
  <g transform="translate(240,212)">
    <rect width="160" height="280" rx="14" fill="#FFFFFF" stroke="#F3D4E3"/>
    <rect width="160" height="32" rx="14" fill="#FCE7F3"/>
    <rect y="18" width="160" height="14" fill="#FCE7F3"/>
    <text x="80" y="22" text-anchor="middle" font-size="12" font-weight="800" fill="#BE185D">DAY 7 — 매일 입력</text>

    <g transform="translate(12,46)" font-size="10" fill="#374151">
      <text font-weight="700" fill="#1F2937">7일 누적 거래 12건</text>

      <g transform="translate(0,16)" font-size="9">
        <text y="0" fill="#6B7280">스타벅스 ×3</text><text x="136" y="0" text-anchor="end" fill="#BE185D">-13.5k</text>
        <text y="14" fill="#6B7280">CU 편의점 ×2</text><text x="136" y="14" text-anchor="end" fill="#BE185D">-6.7k</text>
        <text y="28" fill="#6B7280">버스/지하철 ×6</text><text x="136" y="28" text-anchor="end" fill="#BE185D">-8.4k</text>
        <text y="42" fill="#6B7280">올리브영</text><text x="136" y="42" text-anchor="end" fill="#BE185D">-23.4k</text>
        <text y="56" fill="#6B7280">월급 (입금)</text><text x="136" y="56" text-anchor="end" fill="#10B981">+3,500k</text>
      </g>

      <line y1="84" x2="136" y2="84" stroke="#F3F4F6"/>

      <text y="102" font-weight="700" fill="#1F2937">학습된 가맹점 4개</text>
      <text y="116" font-size="9" fill="#6B7280">스타벅스→카페</text>
      <text y="128" font-size="9" fill="#6B7280">CU→식비</text>
      <text y="140" font-size="9" fill="#6B7280">올리브영→의류</text>
      <text y="152" font-size="9" fill="#6B7280">지하철→교통</text>

      <line y1="162" x2="136" y2="162" stroke="#F3F4F6"/>

      <text y="180" font-weight="700" fill="#10B981">자동 분류 8/10</text>
      <text y="194" font-size="9" fill="#6B7280">사용자 수정 2건</text>

      <g transform="translate(0,210)">
        <rect width="136" height="20" rx="10" fill="#F0FDF4"/>
        <text x="68" y="14" text-anchor="middle" font-size="9" fill="#10B981" font-weight="700">→ 매일 1.7건 입력</text>
      </g>
    </g>
  </g>

  <!-- Day 14 card -->
  <g transform="translate(440,212)">
    <rect width="160" height="280" rx="14" fill="#FFFFFF" stroke="#F3D4E3"/>
    <rect width="160" height="32" rx="14" fill="#FCE7F3"/>
    <rect y="18" width="160" height="14" fill="#FCE7F3"/>
    <text x="80" y="22" text-anchor="middle" font-size="12" font-weight="800" fill="#BE185D">DAY 14 — 영수증</text>

    <g transform="translate(12,46)" font-size="10" fill="#374151">
      <text font-weight="700" fill="#1F2937">영수증 사진 업로드</text>
      <text y="14" font-size="9" fill="#6B7280">친구 만나서 점심 카드</text>

      <line y1="26" x2="136" y2="26" stroke="#F3F4F6"/>

      <text y="44" font-size="9" fill="#9CA3AF">📷 → OpenAI Vision</text>
      <text y="58" font-size="9" fill="#9CA3AF">→ 4초 후 후보 등록</text>

      <line y1="68" x2="136" y2="68" stroke="#F3F4F6"/>

      <text y="86" font-weight="700" fill="#1F2937">분석 후보 카드</text>
      <text y="102" font-size="9" fill="#1F2937">놀부부대찌개 신촌점</text>
      <text x="136" y="102" text-anchor="end" font-size="9" fill="#BE185D" font-weight="700">-22,400</text>
      <text y="116" font-size="9" fill="#6B7280">식비 · 신용카드</text>
      <text y="130" font-size="9" fill="#6B7280">2026.05.14 12:38</text>

      <line y1="140" x2="136" y2="140" stroke="#F3F4F6"/>

      <text y="158" font-weight="700" fill="#1F2937">예산 진척 (14/31)</text>
      <text y="172" font-size="9" fill="#6B7280">남은 예산 312k / 800k</text>
      <text y="184" font-size="9" fill="#10B981" font-weight="700">→ 예측: 월말 -67k 흑자</text>

      <g transform="translate(0,210)">
        <rect width="136" height="20" rx="10" fill="#FFF1F5"/>
        <text x="68" y="14" text-anchor="middle" font-size="9" fill="#BE185D" font-weight="700">→ ✓ 후보 일괄 승인</text>
      </g>
    </g>
  </g>

  <!-- Day 30 card -->
  <g transform="translate(640,212)">
    <rect width="120" height="280" rx="14" fill="#FFFFFF" stroke="#F3D4E3"/>
    <rect width="120" height="32" rx="14" fill="#FCE7F3"/>
    <rect y="18" width="120" height="14" fill="#FCE7F3"/>
    <text x="60" y="22" text-anchor="middle" font-size="12" font-weight="800" fill="#BE185D">DAY 30</text>

    <g transform="translate(12,46)" font-size="10" fill="#374151">
      <text font-weight="700" fill="#1F2937">월말 회고</text>

      <g transform="translate(0,16)" font-size="9">
        <text y="0" fill="#6B7280">총 거래 47건</text>
        <text y="14" fill="#6B7280">총 지출 -732k</text>
        <text y="28" fill="#10B981" font-weight="700">예산 대비 -68k</text>
      </g>

      <line y1="60" x2="96" y2="60" stroke="#F3F4F6"/>

      <text y="78" font-weight="700" fill="#1F2937">AI 회고</text>
      <text y="92" font-size="9" fill="#6B7280">"카페 한도 105%"</text>
      <text y="104" font-size="9" fill="#6B7280">"외식 -22% 줄임"</text>

      <line y1="116" x2="96" y2="116" stroke="#F3F4F6"/>

      <text y="134" font-weight="700" fill="#1F2937">다음 달 결심</text>
      <text y="148" font-size="9" fill="#6B7280">"카페 80k → 60k"</text>

      <g transform="translate(0,170)">
        <rect width="96" height="44" rx="10" fill="#F0FDF4" stroke="#86EFAC"/>
        <text x="48" y="18" text-anchor="middle" font-size="10" font-weight="800" fill="#10B981">유지!</text>
        <text x="48" y="34" text-anchor="middle" font-size="8" fill="#10B981">D31 재진입</text>
      </g>

      <text y="232" font-size="8" fill="#9CA3AF" font-style="italic">습관 형성 신호</text>
    </g>
  </g>

  <!-- legend bottom -->
  <g transform="translate(400,520)" text-anchor="middle">
    <text font-size="10" fill="#9CA3AF">PRD 의 핵심 가설 — Activation 7일·Retention 30일이 만나는 흐름</text>
  </g>
</svg>

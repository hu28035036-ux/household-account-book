<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460" font-family="-apple-system, system-ui, 'Pretendard', sans-serif">
  <rect width="800" height="460" fill="#FFF7FA"/>

  <!-- title -->
  <g transform="translate(400,46)" text-anchor="middle">
    <rect x="-150" y="-22" width="300" height="36" rx="18" fill="#FFFFFF" stroke="#F9A8D4"/>
    <text y="3" font-size="14" font-weight="700" fill="#BE185D">학습 루프 — 쓸수록 똑똑해지는 가계부</text>
  </g>
  <text x="400" y="98" text-anchor="middle" font-size="11" fill="#9CA3AF">사용자의 승인·수정 패턴이 다음 분석 정확도가 됩니다 (Ollama 모델 자체 학습 X — 앱 내부 규칙)</text>

  <!-- circular flow nodes -->
  <!-- center hub -->
  <g transform="translate(400,260)">
    <circle r="60" fill="#FCE7F3" stroke="#F9A8D4" stroke-width="2"/>
    <text y="-6" text-anchor="middle" font-size="14" font-weight="800" fill="#BE185D">사용자</text>
    <text y="14" text-anchor="middle" font-size="14" font-weight="800" fill="#BE185D">결정</text>
    <text y="34" text-anchor="middle" font-size="10" fill="#9CA3AF">최종 권한</text>
  </g>

  <!-- 1: 입력 (top-left) -->
  <g transform="translate(160,180)">
    <rect x="-70" y="-44" width="140" height="88" rx="14" fill="#FFFFFF" stroke="#F3D4E3"/>
    <text y="-20" text-anchor="middle" font-size="18">📷</text>
    <text y="6" text-anchor="middle" font-size="12" font-weight="700" fill="#1F2937">1. 입력</text>
    <text y="22" text-anchor="middle" font-size="10" fill="#6B7280">영수증·CSV·한 줄</text>
    <text y="36" text-anchor="middle" font-size="10" fill="#6B7280">자연어 ("스벅 5천")</text>
  </g>

  <!-- 2: AI 추정 (top-right) -->
  <g transform="translate(640,180)">
    <rect x="-70" y="-44" width="140" height="88" rx="14" fill="#FFFFFF" stroke="#F3D4E3"/>
    <text y="-20" text-anchor="middle" font-size="18">✨</text>
    <text y="6" text-anchor="middle" font-size="12" font-weight="700" fill="#1F2937">2. AI 추정</text>
    <text y="22" text-anchor="middle" font-size="10" fill="#6B7280">OpenAI Vision +</text>
    <text y="36" text-anchor="middle" font-size="10" fill="#6B7280">학습 규칙 보정</text>
  </g>

  <!-- 3: 후보 검토 (bottom-right) -->
  <g transform="translate(640,360)">
    <rect x="-70" y="-44" width="140" height="88" rx="14" fill="#FFFFFF" stroke="#F3D4E3"/>
    <text y="-20" text-anchor="middle" font-size="18">📋</text>
    <text y="6" text-anchor="middle" font-size="12" font-weight="700" fill="#1F2937">3. 후보 검토</text>
    <text y="22" text-anchor="middle" font-size="10" fill="#6B7280">일괄 승인 · 중복</text>
    <text y="36" text-anchor="middle" font-size="10" fill="#6B7280">의심 일괄 거부</text>
  </g>

  <!-- 4: 학습 (bottom-left) -->
  <g transform="translate(160,360)">
    <rect x="-70" y="-44" width="140" height="88" rx="14" fill="#FFFFFF" stroke="#F3D4E3"/>
    <text y="-20" text-anchor="middle" font-size="18">🧠</text>
    <text y="6" text-anchor="middle" font-size="12" font-weight="700" fill="#1F2937">4. 학습</text>
    <text y="22" text-anchor="middle" font-size="10" fill="#6B7280">가맹점→카테고리</text>
    <text y="36" text-anchor="middle" font-size="10" fill="#6B7280">자동 매핑 갱신</text>
  </g>

  <!-- arrows curved between nodes -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F472B6"/>
    </marker>
  </defs>
  <g fill="none" stroke="#F472B6" stroke-width="2" marker-end="url(#arr)">
    <!-- 1 → 2 -->
    <path d="M 230 175 Q 400 130 570 175"/>
    <!-- 2 → 3 -->
    <path d="M 640 224 L 640 316"/>
    <!-- 3 → 4 -->
    <path d="M 570 360 Q 400 410 230 360"/>
    <!-- 4 → 1 -->
    <path d="M 160 316 L 160 224"/>
  </g>

  <!-- center → corner faint links (사용자 결정이 4개 단계 모두에) -->
  <g fill="none" stroke="#F9A8D4" stroke-width="1" stroke-dasharray="3 3" opacity="0.6">
    <line x1="400" y1="260" x2="160" y2="180"/>
    <line x1="400" y1="260" x2="640" y2="180"/>
    <line x1="400" y1="260" x2="640" y2="360"/>
    <line x1="400" y1="260" x2="160" y2="360"/>
  </g>

  <!-- bottom hint -->
  <g transform="translate(400,438)" text-anchor="middle">
    <text font-size="11" fill="#374151">10건 승인 → 11번째부터 자동 분류 정확도 약 90%+ (학습 규칙 누적 효과)</text>
  </g>
</svg>
